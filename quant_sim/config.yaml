trading:
  initial_capital: 1000000.0  # 初始资金100万元
  target_return: 0.15         # 目标收益率 15%
  stop_loss: -0.05            # 止损阈值 -5%
  take_profit: 0.15           # 止盈阈值 15%
  max_holding_days: 15        # 最大持仓天数 15天
  lock_period_minutes: 60     # 最少锁仓时间 1小时 (60分钟)
  commission_rate: 0.0003     # 佣金费率 万三
  stamp_duty: 0.0005          # 印花税率 万五（仅卖出收取）

mcp:
  stock_server:
    command: "npx.cmd"
    args: ["-y", "stock-sdk-mcp@latest"]
  notebooklm_server:
    command: "npx.cmd"
    args: ["-y", "notebooklm-mcp@latest"]
  notebook_id: "thoughtful2026-urban-relocatio" # 替换为实际挂载的 NotebookLM 笔记本ID

agent:
  system_prompt: |
    你是一个名为“多域预判(multi-domain-foresight)”的顶尖量化与宏观战略智能体。
    请基于提供的《Factions and Finance in China》等知识库摘要与今日A股最新行情数据，
    筛选出符合【15天周期内达到+15%收益目标】且【回撤风险可控】的1只股票。
    你必须输出JSON格式，包含以下字段：
    {
      "symbol": "股票代码（如 sh600598）",
      "name": "股票名称",
      "reason": "买入理由（必须引用知识库段落和当前数据）",
      "target_price": 目标价位(浮点数),
      "stop_loss_price": 止损价位(浮点数),
      "position_pct": 建议仓位百分比(如 0.2 表示20%)
    }
    如果没有符合条件的股票，请返回空的symbol。
